name: Build with ESP-IDF v5.3

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Patch BTstack
      shell: bash
      run: |
        cd external/btstack
        git apply ../patches/*.patch

    - name: Install BTstack
      shell: bash
      run: |
        cd external/btstack/port/esp32
        IDF_PATH=../../../../src/ ./integrate_btstack.py

    - name: Unijoysticle build and merge
      uses: espressif/esp-idf-ci-action@main
      with:
        esp_idf_version: release-v5.3
        target: esp32
        path: 'src'
        # Στην v5.3 το merge-bin δουλεύει απευθείας μετά το build
        command: 'idf.py -B build_unijoysticle -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.ci.plat_unijoysticle" build merge-bin'

    - name: Upload Full Flash Image
      uses: actions/upload-artifact@v4
      with:
        name: unijoysticle-full-v5.3
        path: src/build_unijoysticle/merged-binary.bin
        if-no-files-found: error
